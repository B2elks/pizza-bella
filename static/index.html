const CATEGORIES = ["Standard","Inbakad","Special","Kebab","Kyckling","Fläskfilé","Oxfilé","Mexikansk"];

const STATUS_LABELS = {
    new: "NY",
    oven: "I UGNEN",
    ready: "KLAR",
    picked: "HÄMTAD",
    change: "ÄNDRING",
};

function renderMenu() {
    const el = document.getElementById("menu");
    let html = "";
    for (const cat of CATEGORIES) {
        const pizzas = MENU.filter(p => p.cat === cat);
        html += `<div class="menu-category"><h3>${cat}pizzor</h3>`;
        html += pizzas.map(p => `
            <div class="pizza-item">
                <span class="pizza-nr">${p.nr}.</span>
                <span class="pizza-name">${p.name}</span>
                <span class="pizza-price">${p.price} kr</span>
                <span class="pizza-desc">${p.desc}</span>
            </div>
        `).join("");
        html += `</div>`;
    }
    el.innerHTML = html;
}

function renderOrders(orders) {
    const el = document.getElementById("orders");
    const filtered = filterOrders(orders);
    if (!filtered.length) {
        const msg = !orders.length ? "Inga beställningar ännu<br>Ring och beställ!" : "Inga ordrar med denna status";
        el.innerHTML = `<div class="no-orders"><span class="icon">📋</span>${msg}</div>`;
        return;
    }
    el.innerHTML = filtered.map(o => {
        const items = o.items.map(i => `${i.qty}\u00d7 ${i.name}${i.glutenfri ? ' (GF)' : ''}`).join(", ");
        const time = new Date(o.created_at).toLocaleTimeString("sv-SE", {hour:"2-digit", minute:"2-digit"});
        const buttons = getButtons(o);
        return `
            <div class="order-card status-${o.status}">
                <div class="order-header">
                    <span class="order-id"><span class="nr">#${o.id}</span> ${o.customer_name}</span>
                    <span class="order-status ${o.status}">${STATUS_LABELS[o.status] || o.status}</span>
                </div>
                <div class="order-items">${items}</div>
                <div class="order-meta">
                    <span>${o.total_price} kr</span>
                    <span>${time}</span>
                    ${o.customer_phone ? `<span>${o.customer_phone}</span>` : ''}
                </div>
                <div class="order-actions">${buttons}</div>
            </div>
        `;
    }).join("");
}

function getButtons(order) {
    const s = order.status;
    const btns = [];
    if (s === "new") {
        btns.push(`<button class="btn-oven" onclick="updateOrder(this,${order.id},'oven')">I ugnen</button>`);
    }
    if (s === "new" || s === "oven") {
        btns.push(`<button class="btn-ready" onclick="updateOrder(this,${order.id},'ready')">Klar att hämta</button>`);
    }
    if (s === "ready") {
        btns.push(`<button class="btn-picked" onclick="updateOrder(this,${order.id},'picked')">Upphämtad</button>`);
    }
    if (s === "new" || s === "oven" || s === "change") {
        btns.push(`<button class="btn-change" onclick="updateOrder(this,${order.id},'change')">Ändra order</button>`);
    }
    if (s !== "picked") {
        btns.push(`<button class="btn-cancel" onclick="confirmCancel(this,${order.id})">Avbeställ</button>`);
    }
    return btns.join("");
}

let updating = false;
async function updateOrder(btn, id, action) {
    if (updating) return;
    updating = true;
    btn.disabled = true;
    btn.textContent = "...";
    try {
        await fetch(`/api/orders/${id}/${action}`, {method: "POST"});
        await fetchOrders();
    } catch (e) {
        console.error("Failed to update order:", e);
    } finally {
        updating = false;
    }
}

function confirmCancel(btn, id) {
    if (confirm("Vill du avbeställa denna order? Kunden får ett SMS.")) {
        updateOrder(btn, id, "cancel");
    }
}

let currentFilter = "active";
let allOrders = [];

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(`[data-filter="${f}"]`).classList.add("active");
    renderOrders(allOrders);
}

function filterOrders(orders) {
    if (currentFilter === "active") return orders.filter(o => ["new","oven","change"].includes(o.status));
    if (currentFilter === "ready") return orders.filter(o => o.status === "ready");
    return orders;
}

async function fetchOrders() {
    try {
        const resp = await fetch("/api/orders");
        allOrders = await resp.json();
        renderOrders(allOrders);
    } catch (e) {
        console.error("Failed to fetch orders:", e);
    }
}

renderMenu();
fetchOrders();
setInterval(fetchOrders, 3000);
